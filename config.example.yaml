# d2ip example configuration

listen: "127.0.0.1:9099"

source:
  url: "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat"
  cache_path: "/tmp/d2ip-dlc.dat"
  http_timeout: 30s

categories:
  - code: "cn"
    attrs: []
  - code: "google"
    attrs: []

resolver:
  upstream: "8.8.8.8:53"
  network: "udp"
  concurrency: 64
  qps: 1000
  timeout: 5s
  retries: 2
  backoff_base: 100ms
  backoff_max: 5s
  follow_cname: true
  enable_v4: true
  enable_v6: true

cache:
  db_path: "./d2ip.db"
  ttl: 24h
  failed_ttl: 1h
  vacuum_after: 720h

aggregation:
  enabled: true
  level: "conservative"
  v4_max_prefix: 16
  v6_max_prefix: 32

export:
  dir: "./out"
  ipv4_file: "ipv4.txt"
  ipv6_file: "ipv6.txt"

routing:
  enabled: false
  state_dir: "/var/lib/d2ip"

  policies:
    - name: streaming
      enabled: true
      categories: ["geosite:netflix", "geosite:youtube"]
      backend: iproute2
      table_id: 200
      iface: "eth1"
      dry_run: false
      export_format: plain

    - name: corporate
      enabled: true
      categories: ["geosite:google", "geosite:microsoft"]
      backend: iproute2
      table_id: 300
      iface: "wg0"
      dry_run: false
      export_format: plain

    - name: blocklist
      enabled: true
      categories: ["geosite:malware"]
      backend: nftables
      nft_table: "inet d2ip"
      nft_set_v4: "block_v4"
      nft_set_v6: "block_v6"
      dry_run: false
      export_format: nft

scheduler:
  dlc_refresh: 24h
  resolve_cycle: 1h  # Must be >= 1m, or 0 to disable scheduled resolves

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"
